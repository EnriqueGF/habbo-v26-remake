server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Shockwave / Director cast files must be served as application/x-director
    types {
        application/x-director  dcr cct cxt cst dxr dir w3d;
        text/plain              txt;
        text/xml                xml;
        image/gif               gif;
        image/png               png;
        image/jpeg              jpg jpeg;
    }
    default_type application/octet-stream;

    # The legacy client loads assets cross-origin from the CMS domain.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

    location / {
        autoindex off;
        try_files $uri $uri/ =404;
    }
}
