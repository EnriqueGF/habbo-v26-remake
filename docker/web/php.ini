; PHP 8.3 settings for the unified runtime.
; Mirrors the legacy 5.6 config so the ported HoloCMS behaves identically; the
; mysql_* shim, bareword defines and session shims live in _compat.php.

; NOTE: the legacy compat-layer (_compat.php with the mysql_* shim, bareword
; defines and session shims) is loaded explicitly by App\Legacy\LegacyRunner
; just before executing a legacy script — NOT globally via auto_prepend — so it
; never touches native Laravel routes.

; The legacy triggers many notices/deprecations on PHP 8; keep only fatal errors
; so pages still render. Thrown Errors (undefined constant/function, TypeError)
; are NOT suppressed by this — those are fixed via the compat shim.
error_reporting = E_ERROR
display_errors = Off
log_errors = On

short_open_tag = On

; The CMS files and the DB are ISO-8859-1 (latin1). Keeping default_charset on
; latin1 makes htmlspecialchars()/htmlentities() (which use this ini when no
; encoding arg is passed) interpret bytes as latin1, exactly like PHP 5.6 did,
; avoiding mojibake. Switched to UTF-8 in Fase 4.
default_charset = "ISO-8859-1"

date.timezone = Europe/Madrid
session.save_path = "/tmp"

upload_max_filesize = 16M
post_max_size = 16M
memory_limit = 256M
